[target.riscv32imc-unknown-none-elf]
runner = "probe-rs run --chip=esp32c3 --preverify --always-print-stacktrace --no-location --catch-hardfault"

[env]
DEFMT_LOG = "info"
# ==========================================
# Налаштування trouble-host
# ==========================================
TROUBLE_HOST_DEFAULT_PACKET_POOL_MTU = "256"
TROUBLE_HOST_DEFAULT_PACKET_POOL_SIZE = "10"
TROUBLE_HOST_L2CAP_TX_QUEUE_SIZE = "8"
TROUBLE_HOST_L2CAP_RX_QUEUE_SIZE = "8"

# ==========================================
# Налаштування проєкту
# ==========================================
MY_BLE_DEVICE_NAME = "WW-OBD-SCANNER"
MY_BLE_MAX_CONNECTIONS = "1"
MY_BLE_CHANNEL_CAPACITY = "5"
MY_BLE_L2CAP_CHANNELS = "1"
MY_BLE_AD_HANDLES = "1"

[build]
rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C",
  "force-frame-pointers",
]

target = "riscv32imc-unknown-none-elf"

[unstable]
build-std = ["alloc", "core"]
