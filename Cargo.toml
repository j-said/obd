[package]
edition = "2021"
name = "obd-rust"
rust-version = "1.88"
version = "0.1.0"

[[bin]]
name = "obd-rust"
path = "./src/bin/main.rs"
test = false

[[test]]
harness = false
name = "hello_test"

[lib]
test = false

[dependencies]
esp-alloc = { version = "0.9.0", features = ["defmt"] }
esp-hal = { version = "~1.0", features = ["defmt", "esp32c3", "unstable"] }
esp-radio = {version = "0.17.0", features = ["esp32c3", "ble", "defmt", "unstable"]}
esp-rtos = { version = "0.2.0", features = [
  "defmt",
  "embassy",
  "esp-alloc",
  "esp-radio",
  "esp32c3",
] }
esp-bootloader-esp-idf = { version = "0.4.0", features = ["defmt", "esp32c3"] }

panic-rtt-target = { version = "0.2.0", features = ["defmt"] }
rtt-target = { version = "0.6.2", features = ["defmt"] }
defmt = "1.0.1"

embassy-executor = { version = "0.9.1", features = ["defmt"] }
embassy-time = { version = "0.5.0", features = ["defmt"] }
embassy-sync = { version = "0.7.2", features = ["defmt"] }
embassy-futures = { version = "0.1.2", features = ["defmt"] }

embedded-io-async = { version = "=0.6.1", features = ["defmt-03"] }
embedded-io = { version = "0.7.1", features = ["defmt"] }
bt-hci = "=0.6.0" # Лишити такий, поки не вийде міграція esp-hal
trouble-host = { version = "~0.5.1", features = [
  "defmt",
  "peripheral",
  "gatt",
  "derive",
  "default-packet-pool",
  "security",
] }

heapless = { version = "0.9.2", features = ["portable-atomic"] }
portable-atomic = { version = "1.9", default-features = false }
static_cell = "2.1.1"
embedded-can = "0.4"
trait-variant = "0.1.2"

[dev-dependencies]
embedded-test = { version = "0.7.0", features = [
  "defmt",
  "embassy",
  "external-executor",
] }

[profile.dev]
# Rust debug is too slow.
# For debug builds always builds with some optimization
opt-level = "s"

[profile.release]
codegen-units = 1        # LLVM can perform better optimizations using a single thread
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 's'
overflow-checks = false
