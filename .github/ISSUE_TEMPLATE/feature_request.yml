---
name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea in detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "Currently there is no way to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative approaches have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the codebase does this affect?
      multiple: true
      options:
        - Bluetooth / BLE stack
        - CAN bus / OBD layer
        - Embedded HAL / drivers
        - CI/CD / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Links, references, screenshots, or any other context.
