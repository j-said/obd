name: Auto Assign

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  auto-assign-issue:
    name: Auto Assign Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
    steps:
      - name: Auto assign issue to author
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Assign the issue to its author
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [author],
            });

            console.log(`Assigned issue #${issue.number} to ${author}`);

      - name: Add triage label to new issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const existingLabels = issue.labels.map(l => l.name);

            if (existingLabels.length === 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['triage'],
              });
              console.log(`Added 'triage' label to issue #${issue.number}`);
            }

  auto-assign-pr:
    name: Auto Assign PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Auto assign PR to author
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [author],
            });

            console.log(`Assigned PR #${pr.number} to ${author}`);

      - name: Request review from CODEOWNERS
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip draft PRs
            if (pr.draft) {
              console.log('Skipping draft PR');
              return;
            }

            // Fetch CODEOWNERS and request reviews
            // Falls back gracefully if CODEOWNERS is not present or reviewer is the PR author
            try {
              const { data: codeowners } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/CODEOWNERS',
              });

              console.log('CODEOWNERS found – review requests handled by GitHub automatically');
            } catch (e) {
              console.log('No CODEOWNERS file found, skipping review request');
            }
