name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - "**/*.md"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Rust checks (build, fmt, clippy)
  # ──────────────────────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action:
          - command: build
            args: --release
          - command: fmt
            args: --all -- --check
          - command: clippy
            args: --all-features --workspace -- -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf
          toolchain: stable
          components: rust-src, rustfmt, clippy
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
      - name: Run command
        run: cargo ${{ matrix.action.command }} ${{ matrix.action.args }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: rust-checks
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf
          toolchain: stable
          components: rust-src
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features --workspace

  # ──────────────────────────────────────────────────────────────────────────────
  # Build size report (release binary size tracking on PRs)
  # ──────────────────────────────────────────────────────────────────────────────
  size-report:
    name: Binary Size Report
    runs-on: ubuntu-latest
    needs: rust-checks
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          target: riscv32imc-unknown-none-elf
          toolchain: stable
          components: rust-src
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Report binary size
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let sizeOutput = '';
            try {
              sizeOutput = execSync(
                'find target -name "obd-rust" -not -path "*/deps/*" -not -path "*/incremental/*" | head -1 | xargs -I{} du -sh {} 2>/dev/null || echo "Binary not found"'
              ).toString().trim();
            } catch {
              sizeOutput = 'Could not determine binary size';
            }
            const body = `### 📦 Binary Size Report\n\n\`\`\`\n${sizeOutput}\n\`\`\``;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ──────────────────────────────────────────────────────────────────────────────
  # CI status summary (aggregates all jobs for branch-protection rules)
  # ──────────────────────────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [rust-checks, test]
    if: always()
    permissions: {}
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.rust-checks.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
